<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro QR Code - Sistema de Controle de Acesso</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #059669;
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --dark-color: #1e293b;
            --light-color: #f8fafc;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .main-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin: 20px;
            overflow: hidden;
        }
        
        .header-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .header-section p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .header-section .btn {
            white-space: nowrap;
        }
        
        @media (max-width: 768px) {
            .header-section .row {
                text-align: center;
            }
            
            .header-section .col-md-4 {
                margin-top: 15px;
            }
            
            .header-section h1 {
                font-size: 1.8rem;
            }
        }
        
        .content-section {
            padding: 40px;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success-color) 0%, #047857 100%);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(5, 150, 105, 0.3);
        }
        
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .table {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .table thead th {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 15px;
            font-weight: 600;
        }
        
        .table tbody tr:hover {
            background-color: #f8fafc;
        }
        
        .qrcode-preview {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .qrcode-preview img {
            max-width: 300px;
            border: 5px solid white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .qrcode-info {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }
        
        .status-bar {
            background: var(--light-color);
            padding: 15px 30px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--secondary-color);
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-item i {
            color: var(--success-color);
        }
        
        .time-display {
            font-weight: 600;
            color: var(--primary-color);
        }
        
        /* Responsividade */
        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2rem;
            }
            
            .content-section {
                padding: 20px;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header-section">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1><i class="fas fa-qrcode me-3"></i>Cadastro QR Code</h1>
                    <p class="mb-0">Gerar e gerenciar QR Codes dos funcionários</p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="{{ url_for('admin') }}" class="btn btn-outline-light btn-sm me-2">
                        <i class="fas fa-arrow-left me-1"></i>Voltar
                    </a>
                    <a href="{{ url_for('admin_logout') }}" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-out-alt me-1"></i>Sair
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Content -->
        <div class="content-section">
            <!-- Gerar QR Code -->
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="fas fa-qrcode me-2"></i>Gerar QR Code
                    </h5>
                </div>
                <div class="card-body">
                    <form id="formGerarQRCode">
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label for="funcionarioSelect" class="form-label">Funcionário</label>
                                <select class="form-control" id="funcionarioSelect" required>
                                    <option value="">Selecione um funcionário...</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-qrcode me-2"></i>Gerar QR Code
                                </button>
                            </div>
                        </div>
                    </form>
                    
                    <!-- Preview do QR Code -->
                    <div id="qrcodePreview" class="qrcode-preview" style="display: none;">
                        <h5 class="mb-3">QR Code Gerado</h5>
                        <img id="qrcodeImage" src="" alt="QR Code">
                        <div class="qrcode-info">
                            <p class="mb-2"><strong>Funcionário:</strong> <span id="funcionarioNome"></span></p>
                            <p class="mb-2"><strong>Registro:</strong> <span id="funcionarioRegistro"></span></p>
                            <p class="mb-2"><strong>Departamento:</strong> <span id="funcionarioDepartamento"></span></p>
                            <div class="mt-3">
                                <button class="btn btn-success me-2" onclick="baixarQRCode()">
                                    <i class="fas fa-download me-2"></i>Baixar QR Code
                                </button>
                                <button class="btn btn-primary" onclick="imprimirQRCode()">
                                    <i class="fas fa-print me-2"></i>Imprimir
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Lista de Funcionários -->
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="fas fa-list me-2"></i>Funcionários
                    </h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Registro</th>
                                    <th>Nome</th>
                                    <th>Departamento</th>
                                    <th>Cargo</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaFuncionarios">
                                <tr>
                                    <td colspan="5" class="text-center">Carregando funcionários...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- Botão Voltar -->
            <div class="text-center mt-4">
                <a href="/admin" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Voltar ao Painel
                </a>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <i class="fas fa-server"></i>
                <span>Sistema Online</span>
            </div>
            <div class="status-item">
                <i class="fas fa-qrcode"></i>
                <span>QR Code: Ativo</span>
            </div>
            <div class="status-item">
                <i class="fas fa-clock"></i>
                <span class="time-display" id="currentTime">--:--</span>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let qrcodeData = null;
        
        // Atualizar horário em tempo real
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeString;
        }
        
        setInterval(updateTime, 1000);
        updateTime();
        
        // Carregar funcionários
        function carregarFuncionarios() {
            fetch('/api/funcionarios')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const select = document.getElementById('funcionarioSelect');
                        const tbody = document.getElementById('tabelaFuncionarios');
                        
                        // Limpar opções existentes (exceto a primeira)
                        while (select.children.length > 1) {
                            select.removeChild(select.lastChild);
                        }
                        
                        // Limpar tabela
                        tbody.innerHTML = '';
                        
                        if (data.funcionarios.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nenhum funcionário cadastrado</td></tr>';
                            return;
                        }
                        
                        // Adicionar funcionários ao select
                        data.funcionarios.forEach(func => {
                            if (func.ativo) {
                                const option = document.createElement('option');
                                option.value = func.numero_registro;
                                option.textContent = `${func.nome} (${func.numero_registro})`;
                                select.appendChild(option);
                                
                                // Adicionar à tabela
                                const row = document.createElement('tr');
                                row.innerHTML = `
                                    <td>${func.numero_registro}</td>
                                    <td>${func.nome}</td>
                                    <td>${func.departamento}</td>
                                    <td>${func.cargo}</td>
                                    <td>
                                        <button class="btn btn-sm btn-primary" onclick="gerarQRCodeFuncionario('${func.numero_registro}', '${func.nome}')">
                                            <i class="fas fa-qrcode me-1"></i>Gerar QR Code
                                        </button>
                                    </td>
                                `;
                                tbody.appendChild(row);
                            }
                        });
                    }
                })
                .catch(error => {
                    console.error('Erro ao carregar funcionários:', error);
                    document.getElementById('tabelaFuncionarios').innerHTML = 
                        '<tr><td colspan="5" class="text-center text-danger">Erro ao carregar funcionários</td></tr>';
                });
        }
        
        // Gerar QR Code via formulário
        document.getElementById('formGerarQRCode').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const numeroRegistro = document.getElementById('funcionarioSelect').value;
            
            if (!numeroRegistro) {
                alert('Por favor, selecione um funcionário.');
                return;
            }
            
            gerarQRCode(numeroRegistro);
        });
        
        // Gerar QR Code para funcionário específico
        function gerarQRCodeFuncionario(numeroRegistro, nome) {
            document.getElementById('funcionarioSelect').value = numeroRegistro;
            gerarQRCode(numeroRegistro);
        }
        
        // Função para gerar QR Code
        function gerarQRCode(numeroRegistro) {
            fetch(`/api/funcionarios/gerar-qrcode?numero_registro=${numeroRegistro}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        qrcodeData = data;
                        
                        // Mostrar preview
                        document.getElementById('qrcodeImage').src = data.qrcode_image;
                        document.getElementById('funcionarioNome').textContent = data.funcionario.nome;
                        document.getElementById('funcionarioRegistro').textContent = data.funcionario.numero_registro;
                        document.getElementById('funcionarioDepartamento').textContent = data.funcionario.departamento || 'N/A';
                        document.getElementById('qrcodePreview').style.display = 'block';
                        
                        // Scroll para o QR code
                        document.getElementById('qrcodePreview').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    } else {
                        alert('Erro: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    alert('Erro ao gerar QR Code');
                });
        }
        
        // Baixar QR Code
        function baixarQRCode() {
            if (!qrcodeData) return;
            
            const link = document.createElement('a');
            link.href = qrcodeData.qrcode_image;
            link.download = `QRCode_${qrcodeData.funcionario.numero_registro}_${qrcodeData.funcionario.nome.replace(/\s+/g, '_')}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // Imprimir QR Code
        function imprimirQRCode() {
            if (!qrcodeData) return;
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>QR Code - ${qrcodeData.funcionario.nome}</title>
                        <style>
                            body {
                                font-family: Arial, sans-serif;
                                text-align: center;
                                padding: 20px;
                            }
                            img {
                                max-width: 400px;
                                border: 2px solid #000;
                                padding: 10px;
                            }
                            h2 {
                                margin: 20px 0;
                            }
                            p {
                                margin: 10px 0;
                            }
                        </style>
                    </head>
                    <body>
                        <h2>QR Code de Acesso</h2>
                        <img src="${qrcodeData.qrcode_image}" alt="QR Code">
                        <p><strong>Funcionário:</strong> ${qrcodeData.funcionario.nome}</p>
                        <p><strong>Registro:</strong> ${qrcodeData.funcionario.numero_registro}</p>
                        <p><strong>Departamento:</strong> ${qrcodeData.funcionario.departamento || 'N/A'}</p>
                        <p><strong>Cargo:</strong> ${qrcodeData.funcionario.cargo || 'N/A'}</p>
                    </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        // Carregar funcionários ao carregar a página
        carregarFuncionarios();
    </script>
</body>
</html>
