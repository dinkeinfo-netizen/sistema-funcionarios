<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Acesso - Funcionários</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <style>
        /* Variáveis CSS para tema claro */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #059669;
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --dark-color: #1e293b;
            --light-color: #f8fafc;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --card-bg: #ffffff;
            --header-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Variáveis CSS para tema escuro */
        [data-theme="dark"] {
            --primary-color: #3b82f6;
            --secondary-color: #94a3b8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-color: #0f172a;
            --light-color: #1e293b;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow-color: rgba(0,0,0,0.3);
            --card-bg: #1e293b;
            --header-gradient: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--header-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        /* Remover navbar se existir */
        #global-navbar {
            display: none !important;
        }
        
        .main-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 40px var(--shadow-color);
            overflow: hidden;
            max-width: 1200px;
            width: 100%;
            min-height: 600px;
            transition: all 0.3s ease;
        }
        
        .header-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .header-section p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .content-section {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        
        .access-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px var(--shadow-color);
            transition: all 0.3s ease;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .access-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px var(--shadow-color);
            border-color: var(--primary-color);
        }
        
        .access-card i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        
        .access-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--dark-color);
        }
        
        .access-card p {
            color: var(--secondary-color);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .btn-access {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }
        
        .btn-access:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
            color: white;
        }
        
        .btn-facial {
            background: linear-gradient(135deg, var(--success-color) 0%, #047857 100%);
            box-shadow: 0 5px 15px rgba(5, 150, 105, 0.3);
        }
        
        .btn-facial:hover {
            box-shadow: 0 8px 25px rgba(5, 150, 105, 0.4);
        }
        
        .btn-manual {
            background: linear-gradient(135deg, var(--warning-color) 0%, #b45309 100%);
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.3);
        }
        
        .btn-manual:hover {
            box-shadow: 0 8px 25px rgba(217, 119, 6, 0.4);
        }
        

        
        .status-bar {
            background: var(--bg-secondary);
            padding: 15px 30px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-item i {
            color: var(--success-color);
        }
        
        .time-display {
            font-weight: 600;
            color: var(--primary-color);
        }
        
        /* Footer com crédito */
        .footer-credit {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 15px 0;
            margin-top: auto;
            transition: all 0.3s ease;
        }
        
        .developer-credit {
            color: var(--primary-color);
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .developer-credit strong {
            color: var(--dark-color);
            font-weight: 700;
        }
        
        /* Botão de tema */
        #theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        #theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
        
        #theme-toggle:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }
        
        /* Responsividade */
        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2rem;
            }
            
            .content-section {
                padding: 20px;
                grid-template-columns: 1fr;
            }
            
            .access-card {
                padding: 20px;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
        
        /* Animações */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .access-card {
            animation: fadeInUp 0.6s ease-out;
        }
        
        .access-card:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .access-card:nth-child(3) {
            animation-delay: 0.4s;
        }
        

    </style>
</head>
<body>
    <div class="container-fluid" style="padding-top: 20px;">
        <div class="main-container" style="margin: 0 auto;">
            <!-- Header -->
            <div class="header-section">
                <div>
                    <h1><i class="fas fa-id-card me-3"></i>Controle de Acesso</h1>
                    <p>Sistema de Registro de Entrada e Saída de Funcionários</p>
                </div>
            </div>
        
        <!-- Content -->
        <div class="content-section" id="metodosAcesso">
            <!-- Os métodos serão carregados dinamicamente via JavaScript -->
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Carregando métodos de acesso...</span>
                </div>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <i class="fas fa-server"></i>
                <span>Sistema Online</span>
            </div>
            <div class="status-item">
                <i class="fas fa-users"></i>
                <span>Funcionários Ativos: <span id="funcionariosAtivos">--</span></span>
            </div>
            <div class="status-item">
                <i class="fas fa-clock"></i>
                <span class="time-display" id="currentTime">--:--</span>
            </div>
        </div>
        
        <!-- Footer com crédito -->
        <div class="footer-credit">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <span class="text-muted">
                            <i class="fas fa-copyright me-1"></i>
                            2025 Sistema de Controle de Acesso
                        </span>
                    </div>
                    <div class="col-md-6 text-end">
                        <span class="developer-credit">
                            <i class="fas fa-code me-1"></i>
                            Desenvolvido por <strong>DINKE</strong>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Atualizar horário em tempo real
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeString;
        }
        
        // Atualizar a cada segundo
        setInterval(updateTime, 1000);
        updateTime(); // Executar imediatamente
        
        // Verificar status do sistema
        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/status-sistema');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('funcionariosAtivos').textContent = data.funcionarios_ativos || '--';
                }
            } catch (error) {
                console.log('Erro ao verificar status:', error);
            }
        }
        
        // Verificar status a cada 30 segundos
        setInterval(checkSystemStatus, 30000);
        checkSystemStatus(); // Executar imediatamente
        
        // Adicionar efeitos de hover
        document.querySelectorAll('.access-card').forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-5px) scale(1.02)';
            });
            
            card.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });
        
        // Sistema de tema escuro (já gerenciado pelo navbar)
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        
        // ========================================
        // CARREGAR MÉTODOS DE ACESSO HABILITADOS
        // ========================================
        
        function carregarMetodosAcesso() {
            fetch('/api/configuracoes/metodos-acesso')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('metodosAcesso');
                    container.innerHTML = '';
                    
                    if (data.success && data.metodos) {
                        const metodos = data.metodos;
                        
                        // Acesso Facial
                        if (metodos.facial !== false) {
                            container.innerHTML += `
                                <div class="access-card">
                                    <i class="fas fa-camera"></i>
                                    <h3>Acesso Facial</h3>
                                    <p>Reconhecimento facial automático para registro rápido e seguro de entrada e saída.</p>
                                    <a href="/acesso-facial" class="btn-access btn-facial">
                                        <i class="fas fa-eye me-2"></i>Acessar com Face
                                    </a>
                                </div>
                            `;
                        }
                        
                        // Acesso Manual
                        if (metodos.manual !== false) {
                            container.innerHTML += `
                                <div class="access-card">
                                    <i class="fas fa-keyboard"></i>
                                    <h3>Acesso Manual</h3>
                                    <p>Digite seu número de registro para registrar entrada, saída ou intervalos.</p>
                                    <a href="/acesso-manual" class="btn-access btn-manual">
                                        <i class="fas fa-edit me-2"></i>Digitar Registro
                                    </a>
                                </div>
                            `;
                        }
                        
                        // Acesso RFID
                        if (metodos.rfid !== false) {
                            container.innerHTML += `
                                <div class="access-card">
                                    <i class="fas fa-credit-card"></i>
                                    <h3>Acesso RFID</h3>
                                    <p>Utilize seu cartão ou tag RFID para acesso rápido e sem contato.</p>
                                    <a href="/acesso-rfid" class="btn-access">
                                        <i class="fas fa-wifi me-2"></i>Usar RFID
                                    </a>
                                </div>
                            `;
                        }
                        
                        // Acesso QR Code
                        if (metodos.qrcode !== false) {
                            container.innerHTML += `
                                <div class="access-card">
                                    <i class="fas fa-qrcode"></i>
                                    <h3>Acesso QR Code</h3>
                                    <p>Leia seu QR Code único através da câmera para registro de acesso.</p>
                                    <a href="/acesso-qrcode" class="btn-access">
                                        <i class="fas fa-qrcode me-2"></i>Usar QR Code
                                    </a>
                                </div>
                            `;
                        }
                        
                        // Se nenhum método estiver habilitado
                        if (container.innerHTML === '') {
                            container.innerHTML = `
                                <div class="access-card" style="grid-column: 1 / -1;">
                                    <i class="fas fa-exclamation-triangle" style="color: var(--warning-color);"></i>
                                    <h3>Nenhum Método de Acesso Habilitado</h3>
                                    <p>Entre em contato com o administrador do sistema para habilitar métodos de acesso.</p>
                                </div>
                            `;
                        }
                        
                        // Aplicar efeitos de hover nos novos cards
                        container.querySelectorAll('.access-card').forEach(card => {
                            card.addEventListener('mouseenter', function() {
                                this.style.transform = 'translateY(-5px) scale(1.02)';
                            });
                            
                            card.addEventListener('mouseleave', function() {
                                this.style.transform = 'translateY(0) scale(1)';
                            });
                        });
                    } else {
                        // Fallback: mostrar todos os métodos se houver erro
                        container.innerHTML = `
                            <div class="access-card">
                                <i class="fas fa-camera"></i>
                                <h3>Acesso Facial</h3>
                                <p>Reconhecimento facial automático para registro rápido e seguro de entrada e saída.</p>
                                <a href="/acesso-facial" class="btn-access btn-facial">
                                    <i class="fas fa-eye me-2"></i>Acessar com Face
                                </a>
                            </div>
                            <div class="access-card">
                                <i class="fas fa-keyboard"></i>
                                <h3>Acesso Manual</h3>
                                <p>Digite seu número de registro para registrar entrada, saída ou intervalos.</p>
                                <a href="/acesso-manual" class="btn-access btn-manual">
                                    <i class="fas fa-edit me-2"></i>Digitar Registro
                                </a>
                            </div>
                            <div class="access-card">
                                <i class="fas fa-credit-card"></i>
                                <h3>Acesso RFID</h3>
                                <p>Utilize seu cartão ou tag RFID para acesso rápido e sem contato.</p>
                                <a href="/acesso-rfid" class="btn-access">
                                    <i class="fas fa-wifi me-2"></i>Usar RFID
                                </a>
                            </div>
                            <div class="access-card">
                                <i class="fas fa-qrcode"></i>
                                <h3>Acesso QR Code</h3>
                                <p>Leia seu QR Code único através da câmera para registro de acesso.</p>
                                <a href="/acesso-qrcode" class="btn-access">
                                    <i class="fas fa-qrcode me-2"></i>Usar QR Code
                                </a>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('Erro ao carregar métodos de acesso:', error);
                    // Em caso de erro, mostrar todos os métodos
                    const container = document.getElementById('metodosAcesso');
                    container.innerHTML = `
                        <div class="access-card">
                            <i class="fas fa-camera"></i>
                            <h3>Acesso Facial</h3>
                            <p>Reconhecimento facial automático para registro rápido e seguro de entrada e saída.</p>
                            <a href="/acesso-facial" class="btn-access btn-facial">
                                <i class="fas fa-eye me-2"></i>Acessar com Face
                            </a>
                        </div>
                        <div class="access-card">
                            <i class="fas fa-keyboard"></i>
                            <h3>Acesso Manual</h3>
                            <p>Digite seu número de registro para registrar entrada, saída ou intervalos.</p>
                            <a href="/acesso-manual" class="btn-access btn-manual">
                                <i class="fas fa-edit me-2"></i>Digitar Registro
                            </a>
                        </div>
                        <div class="access-card">
                            <i class="fas fa-credit-card"></i>
                            <h3>Acesso RFID</h3>
                            <p>Utilize seu cartão ou tag RFID para acesso rápido e sem contato.</p>
                            <a href="/acesso-rfid" class="btn-access">
                                <i class="fas fa-wifi me-2"></i>Usar RFID
                            </a>
                        </div>
                        <div class="access-card">
                            <i class="fas fa-qrcode"></i>
                            <h3>Acesso QR Code</h3>
                            <p>Leia seu QR Code único através da câmera para registro de acesso.</p>
                            <a href="/acesso-qrcode" class="btn-access">
                                <i class="fas fa-qrcode me-2"></i>Usar QR Code
                            </a>
                        </div>
                    `;
                });
        }
        
        // Carregar métodos ao iniciar
        carregarMetodosAcesso();
    </script>
</body>
</html>
