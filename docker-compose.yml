version: '3.8'

services:
  # Banco de dados MySQL para sistema de acesso
  acesso_mysql:
    image: mysql:8.0
    container_name: acesso_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      - "3311:3306"
    volumes:
      - mysql_acesso_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - acesso_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Aplicação Flask para controle de acesso
  flask_acesso:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acesso_flask
    restart: unless-stopped
    environment:
      MYSQL_HOST: acesso_mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SECRET_KEY: ${SECRET_KEY}
      TZ: America/Sao_Paulo
      # IP do sistema real - Configure com o IP da máquina hospedeira
      # O sistema detecta automaticamente, mas em Docker é recomendado configurar manualmente
      SISTEMA_REAL_IP: 192.168.3.93
      # Ou URL completa:
      # SISTEMA_REAL_URL: https://192.168.3.93:8444
      # Porta do sistema real (padrão: 8444)
      # SISTEMA_REAL_PORT: 8444
    ports:
      - "5009:8081"
    volumes:
      - ./sistema_acesso_funcionarios.py:/app/sistema_acesso_funcionarios.py
      - ./templates:/app/templates
      - ./static:/app/static
      - ./logs:/app/logs
      - ./config_ip.txt:/app/config_ip.txt
    depends_on:
      acesso_mysql:
        condition: service_healthy
    networks:
      - acesso_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5009/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Proxy reverso Caddy para sistema de acesso
  caddy_acesso:
    image: caddy:2-alpine
    container_name: acesso_caddy
    restart: unless-stopped
    ports:
      - "8081:80"
      - "8444:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs
      - caddy_acesso_data:/data
      - caddy_acesso_config:/config
      - ./logs/caddy:/var/log/caddy
    environment:
      - ACME_AGREE=true
    depends_on:
      - flask_acesso
    networks:
      - acesso_network

volumes:
  mysql_acesso_data:
  caddy_acesso_data:
  caddy_acesso_config:

networks:
  acesso_network:
    driver: bridge 
